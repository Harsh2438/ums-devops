{% extends 'base.html' %}

{% block auth_content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center"
     style="background: linear-gradient(135deg, #1a3c5e 0%, #2d6a9f 100%);">
    <div class="card shadow-lg" style="width: 420px; border-radius: 16px; border: none;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <div class="mb-3">
                    <i class="fas fa-university fa-3x" style="color: #1a3c5e;"></i>
                </div>
                <h4 class="fw-bold" style="color: #1a3c5e;">UniManage</h4>
                <p class="text-muted mb-0">University Management System</p>
            </div>

            {% if messages %}
                {% for msg in messages %}
                <div class="alert alert-danger">{{ msg }}</div>
                {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">Username</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        {{ form.username }}
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        {{ form.password }}
                    </div>
                </div>
                <button type="submit" class="btn w-100 text-white fw-semibold"
                        style="background: #1a3c5e; border-radius: 8px; padding: 12px;">
                    <i class="fas fa-sign-in-alt me-2"></i>Sign In
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
