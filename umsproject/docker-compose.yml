version: '3.9'

services:

  web:
    build: .
    container_name: ums_web

    command: gunicorn --bind 0.0.0.0:8000 umsproject.wsgi:application

    volumes:
      - .:/app
      - static_volume:/app/static

    expose:
      - 8000

    env_file:
      - .env

    depends_on:
      - db

  db:
    image: postgres:16

    container_name: ums_db

    volumes:
      - postgres_data:/var/lib/postgresql/data/

    environment:
      POSTGRES_DB: umsdb
      POSTGRES_USER: umsuser
      POSTGRES_PASSWORD: umspassword

  nginx:
    image: nginx:latest

    container_name: ums_nginx

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/static

    depends_on:
      - web

volumes:
  postgres_data:
  static_volume: